document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

562de70\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n  <style>/* ========== Clockchain 2026 — Design System ========== */\n\n:root {\n  /* Surface — DARK (default) */\n  --bg: oklch(0.12 0.012 150);\n  --bg-deep: oklch(0.07 0.01 150);\n  --bg-elev: oklch(0.16 0.012 150);\n  --panel: oklch(0.22 0.014 150 / 0.55);\n  --panel-2: oklch(0.28 0.014 150 / 0.45);\n  --line: oklch(1 0 0 / 0.08);\n  --line-strong: oklch(1 0 0 / 0.18);\n\n  /* Text */\n  --fg: oklch(0.97 0.005 145);\n  --fg-2: oklch(0.78 0.008 145);\n  --fg-3: oklch(0.58 0.012 145);\n  --fg-4: oklch(0.42 0.014 145);\n\n  /* Brand accent — steel blue #6699cc (used for emphasis, italic headings, glow rims) */\n  --acc: oklch(0.66 0.087 248);\n  --acc-2: oklch(0.66 0.087 248);\n  --acc-dim: oklch(0.5 0.087 248);\n  --acc-glow: oklch(0.66 0.087 248 / 0.45);\n\n  /* State / brand accent — bright green #00cc00. Logo, Clockchain wordmark, LIVE, primary CTA */\n  --state: oklch(0.72 0.255 142);\n  --state-2: oklch(0.72 0.255 142);\n  --state-dim: oklch(0.5 0.25 142);\n  --state-glow: oklch(0.72 0.255 142 / 0.45);\n\n  /* Deep teal #2c8769 — used for deep tints, secondary fills, hover layers */\n  --acc-deep: oklch(0.52 0.10 165);\n  --acc-deep-glow: oklch(0.52 0.10 165 / 0.45);\n\n  /* Pale blue #bddbe8 — soft ambient tone, faint glows, light-theme accent */\n  --acc-pale: oklch(0.87 0.029 220);\n  --acc-pale-glow: oklch(0.87 0.029 220 / 0.35);\n\n  /* Type */\n  --f-display: \"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n  --f-sans: \"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n  --f-mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Metrics */\n  --maxw: 1440px;\n  --gut: clamp(20px, 4vw, 56px);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { background: var(--bg); color: var(--fg); }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: var(--f-sans);\n  font-weight: 400;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n  background:\n    radial-gradient(1200px 700px at 80% -10%, oklch(0.4 0.16 142 / 0.18), transparent 60%),\n    radial-gradient(900px 600px at -10% 30%, oklch(0.4 0.16 142 / 0.10), transparent 60%),\n    var(--bg);\n  background-attachment: fixed;\n}\n\na { color: inherit; text-decoration: none; }\nimg, svg { display: block; max-width: 100%; }\n\n/* Selection */\n::selection { background: var(--acc); color: var(--bg-deep); }\n\n/* Scrollbar */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: var(--bg-deep); }\n::-webkit-scrollbar-thumb { background: oklch(0.3 0.02 145); border-radius: 8px; }\n::-webkit-scrollbar-thumb:hover { background: var(--acc-dim); }\n\n/* ========== Utility ========== */\n.shell { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }\n.eyebrow {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.eyebrow::before {\n  content: \"\";\n  display: inline-block;\n  width: 6px; height: 6px; border-radius: 999px;\n  background: var(--acc);\n  box-shadow: 0 0 12px var(--acc-glow);\n}\n\n/* ---- Liquid glass: subtle base + gradient inner border via ::before ---- */\n.glass, .glass-2, .liquid-glass {\n  position: relative;\n  overflow: hidden;\n  background: oklch(1 0 0 / 0.02);\n  background-blend-mode: luminosity;\n  backdrop-filter: blur(14px) saturate(150%);\n  -webkit-backdrop-filter: blur(14px) saturate(150%);\n  box-shadow:\n    inset 0 1px 1px oklch(1 0 0 / 0.10),\n    0 24px 60px -40px oklch(0 0 0 / 0.6);\n  border: none;\n  border-radius: 22px;\n}\n.glass-2 { border-radius: 26px; }\n.glass::before, .glass-2::before, .liquid-glass::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  border-radius: inherit;\n  padding: 1.4px;\n  background: linear-gradient(\n    180deg,\n    oklch(1 0 0 / 0.45) 0%,\n    oklch(1 0 0 / 0.15) 20%,\n    oklch(1 0 0 / 0) 40%,\n    oklch(1 0 0 / 0) 60%,\n    oklch(1 0 0 / 0.12) 80%,\n    oklch(1 0 0 / 0.4) 100%\n  );\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n          mask-composite: exclude;\n  pointer-events: none;\n  z-index: 1;\n}\n.glass-2 {\n  background:\n    linear-gradient(180deg, oklch(1 0 0 / 0.035), oklch(1 0 0 / 0.005)),\n    oklch(1 0 0 / 0.02);\n}\n/* Make sure card contents sit above the ::before border */\n.glass > *, .glass-2 > *, .liquid-glass > * { position: relative; z-index: 2; }\n[data-theme=\"light\"] .glass,\n[data-theme=\"light\"] .glass-2,\n[data-theme=\"light\"] .liquid-glass {\n  background: oklch(1 0 0 / 0.5);\n  box-shadow:\n    inset 0 1px 1px oklch(1 0 0 / 0.8),\n    0 24px 60px -40px oklch(0 0 0 / 0.18);\n}\n[data-theme=\"light\"] .glass::before,\n[data-theme=\"light\"] .glass-2::before,\n[data-theme=\"light\"] .liquid-glass::before {\n  background: linear-gradient(\n    180deg,\n    oklch(0 0 0 / 0.22) 0%,\n    oklch(0 0 0 / 0.10) 20%,\n    oklch(0 0 0 / 0) 40%,\n    oklch(0 0 0 / 0) 60%,\n    oklch(0 0 0 / 0.06) 80%,\n    oklch(0 0 0 / 0.18) 100%\n  );\n}\n\n/* Reveal */\n.reveal {\n  opacity: 0;\n  transform: translateY(36px);\n  transition:\n    opacity 1.6s cubic-bezier(.16,1,.3,1),\n    transform 2s cubic-bezier(.16,1,.3,1);\n  transition-delay: var(--d, 0ms);\n}\n.reveal.in { opacity: 1; transform: none; }\n\n/* Directional reveals — slide in from edges */\n.reveal[data-reveal=\"left\"]  { transform: translateX(-44vw); }\n.reveal[data-reveal=\"right\"] { transform: translateX(44vw); }\n.reveal[data-reveal=\"left\"].in,\n.reveal[data-reveal=\"right\"].in { transform: none; }\n\n/* Swipe reveals — like data-reveal but triggered on scroll-into-view (not at load).\n   Use for content below the fold that should swipe in from off-canvas. */\n.reveal[data-swipe=\"left\"]  { transform: translate3d(-55vw, 0, 0); opacity: 0; }\n.reveal[data-swipe=\"right\"] { transform: translate3d(55vw, 0, 0); opacity: 0; }\n.reveal[data-swipe=\"left\"],\n.reveal[data-swipe=\"right\"] {\n  transition:\n    opacity 1.6s cubic-bezier(.16,1,.3,1),\n    transform 2s cubic-bezier(.16,1,.3,1);\n  transition-delay: var(--d, 0ms);\n}\n.reveal[data-swipe=\"left\"].in,\n.reveal[data-swipe=\"right\"].in {\n  transform: translate3d(0, 0, 0);\n  opacity: 1;\n}\n\n/* ========== Background grid layer ========== */\n.bg-grid {\n  position: fixed; inset: 0; pointer-events: none; z-index: 0;\n  background-image:\n    linear-gradient(to right, oklch(1 0 0 / 0.025) 1px, transparent 1px),\n    linear-gradient(to bottom, oklch(1 0 0 / 0.025) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);\n}\n.bg-orb {\n  position: fixed;\n  width: 720px; height: 720px; border-radius: 999px;\n  background: radial-gradient(circle, oklch(0.8 0.25 142 / 0.18), transparent 65%);\n  pointer-events: none; z-index: 0;\n  filter: blur(20px);\n  animation: orbDrift 24s ease-in-out infinite;\n}\n.bg-orb.a { top: -200px; right: -180px; }\n.bg-orb.b { bottom: -300px; left: -200px; animation-delay: -12s; background: radial-gradient(circle, oklch(0.65 0.12 200 / 0.10), transparent 65%); }\n@keyframes orbDrift {\n  0%, 100% { transform: translate(0,0) scale(1); }\n  50% { transform: translate(40px, -30px) scale(1.06); }\n}\n\n/* ========== Header / Nav ========== */\n.nav {\n  position: fixed; top: 16px; left: 0; right: 0; z-index: 50;\n  display: flex; justify-content: center; pointer-events: none;\n}\n.nav-inner {\n  pointer-events: auto;\n  width: min(1320px, calc(100vw - 32px));\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 12px 16px 12px 22px;\n  background: oklch(1 0 0 / 0.02);\n  background-blend-mode: luminosity;\n  backdrop-filter: blur(14px) saturate(160%);\n  -webkit-backdrop-filter: blur(14px) saturate(160%);\n  box-shadow: inset 0 1px 1px oklch(1 0 0 / 0.10);\n  border: none;\n  border-radius: 999px;\n  position: relative;\n  overflow: hidden;\n  transition: background .3s ease, box-shadow .3s ease;\n}\n.nav-inner::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  border-radius: inherit;\n  padding: 1.4px;\n  background: linear-gradient(\n    180deg,\n    oklch(1 0 0 / 0.45) 0%,\n    oklch(1 0 0 / 0.15) 20%,\n    oklch(1 0 0 / 0) 40%,\n    oklch(1 0 0 / 0) 60%,\n    oklch(1 0 0 / 0.12) 80%,\n    oklch(1 0 0 / 0.4) 100%\n  );\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n          mask-composite: exclude;\n  pointer-events: none;\n  z-index: 1;\n}\n.nav-inner > * { position: relative; z-index: 2; }\n.nav.scrolled .nav-inner {\n  background: oklch(0.08 0.01 150 / 0.55);\n  box-shadow:\n    inset 0 1px 1px oklch(1 0 0 / 0.12),\n    0 12px 40px -10px oklch(0 0 0 / 0.5);\n}\n[data-theme=\"light\"] .nav-inner {\n  background: oklch(1 0 0 / 0.5);\n  box-shadow: inset 0 1px 1px oklch(1 0 0 / 0.8);\n}\n[data-theme=\"light\"] .nav-inner::before {\n  background: linear-gradient(\n    180deg,\n    oklch(0 0 0 / 0.22) 0%,\n    oklch(0 0 0 / 0.1) 20%,\n    oklch(0 0 0 / 0) 40%,\n    oklch(0 0 0 / 0) 60%,\n    oklch(0 0 0 / 0.06) 80%,\n    oklch(0 0 0 / 0.18) 100%\n  );\n}\n[data-theme=\"light\"] .nav.scrolled .nav-inner {\n  background: oklch(1 0 0 / 0.78);\n}\n.nav-logo {\n  display: flex; align-items: center; gap: 10px;\n  font-family: var(--f-display); font-weight: 800; font-size: 34px;\n  letter-spacing: -0.01em;\n  color: var(--state);\n}\n.nav-logo .mark {\n  width: 52px; height: 52px;\n}\n.nav-links {\n  display: flex; gap: 4px; align-items: center;\n}\n.nav-links a {\n  font-family: var(--f-sans); font-size: 14px; font-weight: 700;\n  color: var(--fg); padding: 8px 14px; border-radius: 999px;\n  letter-spacing: -0.005em;\n  transition: background .2s ease, color .2s ease;\n}\n.nav-links a:hover { background: oklch(1 0 0 / 0.06); color: var(--fg); }\n\n.nav-right {\n  display: flex; align-items: center; gap: 10px;\n}\n.nav-socials {\n  display: inline-flex; align-items: center; gap: 2px;\n}\n.nav-socials a {\n  width: 32px; height: 32px;\n  display: grid; place-items: center;\n  border-radius: 999px;\n  color: var(--fg-2);\n  transition: background .2s ease, color .2s ease;\n}\n.nav-socials a:hover {\n  background: oklch(1 0 0 / 0.06);\n  color: var(--acc);\n}\n.nav-socials svg {\n  width: 16px; height: 16px;\n  fill: currentColor;\n}\n.nav-sep {\n  width: 1px; height: 22px;\n  background: var(--line-strong);\n  margin: 0 4px;\n}\n.nav-cta {\n  font-family: var(--f-sans); font-size: 14px; font-weight: 700;\n  /* Glassmorphism green pill — matches .hero-live-pill */\n  --acc: var(--state);\n  --acc-glow: var(--state-glow);\n  background: oklch(0.72 0.255 142 / 0.08);\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n  color: var(--acc);\n  padding: 10px 18px; border-radius: 999px;\n  display: inline-flex; align-items: center; gap: 8px;\n  letter-spacing: -0.005em;\n  box-shadow:\n    inset 0 0 0 1px var(--acc),\n    inset 0 1px 0 oklch(1 0 0 / 0.12),\n    0 6px 18px -8px var(--acc-glow);\n  transition: transform .2s ease, box-shadow .2s ease, background .2s ease;\n}\n.nav-cta:hover {\n  transform: translateY(-1px);\n  background: oklch(0.72 0.255 142 / 0.12);\n  box-shadow:\n    inset 0 0 0 1px var(--acc),\n    inset 0 1px 0 oklch(1 0 0 / 0.16),\n    0 14px 30px -10px var(--acc-glow);\n}\n.nav-cta .arrow {\n  width: 14px; height: 14px; transition: transform .2s ease;\n}\n.nav-cta:hover .arrow { transform: translate(2px, -2px); }\n\n/* ========== Hero ========== */\n.hero {\n  position: relative; z-index: 1;\n  padding: 160px 0 100px;\n  min-height: 100vh;\n  display: flex; flex-direction: column; justify-content: center;\n  overflow: hidden;\n  isolation: isolate;\n}\n\n/* Background video layer */\n.hero-video-wrap {\n  position: absolute; inset: 0;\n  z-index: 0;\n  pointer-events: none;\n  overflow: hidden;\n}\n.hero-video {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  object-fit: cover;\n  object-position: center;\n  opacity: 0;\n  will-change: opacity, transform, translate;\n  /* Tint toward warm gold + soften */\n  filter: hue-rotate(-40deg) saturate(0.55) contrast(1.06) brightness(0.95) sepia(0.15);\n  animation: heroVidBreath 24s ease-in-out infinite alternate;\n}\n@keyframes heroVidBreath {\n  0%   { transform: scale(1.03); }\n  100% { transform: scale(1.12); }\n}\n.hero-video-tint {\n  position: absolute; inset: 0;\n  background:\n    radial-gradient(ellipse 70% 55% at 50% 50%, transparent 0%, oklch(0.08 0.012 150 / 0.35) 70%, oklch(0.08 0.012 150 / 0.85) 100%),\n    linear-gradient(180deg, oklch(0.08 0.012 150 / 0.2) 0%, oklch(0.08 0.012 150 / 0.35) 55%, var(--bg) 100%);\n}\n.hero-video-vignette {\n  position: absolute; inset: 0;\n  background:\n    radial-gradient(ellipse 60% 40% at 18% 80%, oklch(0.66 0.087 248 / 0.16), transparent 60%),\n    radial-gradient(ellipse 50% 40% at 82% 15%, oklch(0.66 0.087 248 / 0.10), transparent 60%);\n  mix-blend-mode: plus-lighter;\n}\n.hero-video-grid {\n  position: absolute; inset: 0;\n  background-image:\n    linear-gradient(to right, oklch(1 0 0 / 0.035) 1px, transparent 1px),\n    linear-gradient(to bottom, oklch(1 0 0 / 0.035) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 90%);\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 90%);\n  opacity: 0.6;\n}\n\n/* Theme: light luxe — soften the video, invert tint */\n[data-theme=\"light\"] .hero-video {\n  filter: hue-rotate(8deg) saturate(0.45) contrast(0.9) brightness(1.1);\n  opacity: 0;\n}\n[data-theme=\"light\"] .hero-video-tint {\n  background:\n    radial-gradient(ellipse 70% 55% at 50% 50%, transparent 0%, oklch(0.96 0.005 75 / 0.45) 70%, oklch(0.96 0.005 75 / 0.85) 100%),\n    linear-gradient(180deg, oklch(0.96 0.005 75 / 0.25) 0%, oklch(0.96 0.005 75 / 0.4) 55%, var(--bg) 100%);\n}\n\n/* Ensure hero contents sit above video */\n.hero > .shell { position: relative; z-index: 2; }\n.hero .hero-eyebrow-row,\n.hero .kinetic-title,\n.hero .hero-row,\n.hero .cta-row,\n.hero .subscribe { position: relative; z-index: 2; }\n\n@media (prefers-reduced-motion: reduce) {\n  .hero-video { animation: none; }\n}\n.hero-eyebrow-row {\n  display: flex; gap: 16px; align-items: center; flex-wrap: wrap;\n  margin-bottom: 36px;\n}\n/* ----- Pills: outlined, bold accent text (no fill) ----- */\n.hero-live-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 14px 6px 12px;\n  border-radius: 999px;\n  /* Glassmorphism backdrop with green text + outline */\n  background: oklch(0.72 0.255 142 / 0.08);\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n  /* LIVE pills carry the operational STATE accent (green) */\n  --acc: var(--state);\n  --acc-glow: var(--state-glow);\n  box-shadow:\n    inset 0 0 0 1px var(--acc),\n    inset 0 1px 0 oklch(1 0 0 / 0.12),\n    0 6px 18px -8px var(--acc-glow);\n  font-family: var(--f-mono);\n  font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--acc);\n  font-weight: 700;\n}\n.hero-live-pill .live-dot { width: 6px; height: 6px; }\n.hero-live-meta {\n  font-family: var(--f-mono);\n  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--fg-2);\n  white-space: nowrap;\n}\n\n/* Trusted by builders */\n.trusted {\n  display: flex; flex-direction: column; gap: 12px;\n  margin-top: 6px;\n}\n.trusted-label {\n  font-family: var(--f-mono);\n  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--fg-3);\n}\n.trusted-row {\n  display: flex; flex-wrap: wrap; gap: 10px;\n}\n.trusted-chip {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 8px 16px 8px 12px;\n  border-radius: 999px;\n  background: oklch(1 0 0 / 0.04);\n  box-shadow: inset 0 0 0 1px oklch(1 0 0 / 0.08);\n  font-family: var(--f-sans);\n  font-size: 13px; font-weight: 500;\n  color: var(--fg);\n  transition: background .2s ease, box-shadow .2s ease;\n}\n.trusted-chip:hover {\n  background: oklch(1 0 0 / 0.07);\n  box-shadow: inset 0 0 0 1px oklch(1 0 0 / 0.16);\n}\n.tc-mark {\n  width: 14px; height: 14px; border-radius: 999px;\n  background: radial-gradient(circle at 30% 30%, color-mix(in oklch, var(--c) 80%, white 20%), var(--c) 70%);\n  box-shadow: 0 0 0 1px oklch(0 0 0 / 0.4);\n  flex-shrink: 0;\n}\n.tc-meta { color: var(--fg-3); font-weight: 400; }\n\n/* Bottom horizontal stat strip */\n.hero-stat-strip {\n  margin-top: 56px;\n  padding: 22px clamp(20px, 2.5vw, 32px);\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  border-radius: 22px;\n  position: relative;\n}\n.hss-cell {\n  display: flex; align-items: center; gap: 18px;\n  padding: 4px 26px;\n  border-right: 1px solid var(--line);\n}\n.hss-cell:last-child { border-right: 0; }\n.hss-icon {\n  width: 44px; height: 44px; border-radius: 12px;\n  background: oklch(0.66 0.087 248 / 0.10);\n  box-shadow: inset 0 0 0 1px oklch(0.66 0.087 248 / 0.3);\n  display: grid; place-items: center;\n  color: var(--acc);\n  flex-shrink: 0;\n}\n.hss-icon svg { width: 22px; height: 22px; }\n.hss-body { display: flex; flex-direction: column; gap: 2px; }\n.hss-label {\n  font-family: var(--f-mono);\n  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;\n  color: var(--fg-3);\n  white-space: nowrap;\n}\n.hss-val {\n  font-family: var(--f-display);\n  font-size: clamp(22px, 2.2vw, 30px);\n  font-weight: 600;\n  color: var(--fg);\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n  line-height: 1.05;\n}\n.hss-sub {\n  font-family: var(--f-mono);\n  font-size: 10px; letter-spacing: 0.06em;\n  color: var(--fg-4);\n}\n\n@media (max-width: 1080px) {\n  .hero-stat-strip { grid-template-columns: 1fr 1fr; }\n  .hss-cell { border-right: 0; padding: 12px 20px; }\n  .hss-cell:nth-child(odd) { border-right: 1px solid var(--line); }\n  .hss-cell:nth-child(-n+2) { border-bottom: 1px solid var(--line); }\n}\n@media (max-width: 620px) {\n  .hero-stat-strip { grid-template-columns: 1fr; }\n  .hss-cell, .hss-cell:nth-child(odd), .hss-cell:nth-child(-n+2) {\n    border-right: 0; border-bottom: 1px solid var(--line);\n  }\n  .hss-cell:last-child { border-bottom: 0; }\n}\n.live-dot {\n  width: 8px; height: 8px; border-radius: 999px; background: var(--acc);\n  box-shadow: 0 0 0 0 var(--acc-glow);\n  animation: livePulse 1.8s ease-out infinite;\n}\n@keyframes livePulse {\n  0% { box-shadow: 0 0 0 0 var(--state-glow); }\n  70% { box-shadow: 0 0 0 14px oklch(0.72 0.255 142 / 0); }\n  100% { box-shadow: 0 0 0 0 oklch(0.72 0.255 142 / 0); }\n}\n\n.kinetic-title {\n  font-family: var(--f-display);\n  font-weight: 600;\n  font-size: clamp(48px, 6.4vw, 108px);\n  line-height: 0.94;\n  letter-spacing: -0.035em;\n  margin-bottom: 32px;\n}\n.kinetic-title .line {\n  display: block;\n  overflow: visible;\n}\n.kinetic-title .word {\n  display: inline-block;\n  transition: font-weight .35s ease, letter-spacing .35s ease, color .35s ease;\n}\n.kinetic-title .word:hover {\n  font-weight: 700;\n  letter-spacing: -0.05em;\n}\n.kinetic-title .italic {\n  font-style: italic;\n  font-family: \"Instrument Serif\", \"Space Grotesk\", serif;\n  font-weight: 400;\n  color: var(--acc);\n  letter-spacing: -0.02em;\n}\n.kinetic-title .italic.huge {\n  font-size: 1.32em;\n  line-height: 0.82;\n  display: inline-block;\n  transform: translateY(0.06em);\n  margin: 0 0.04em;\n  text-shadow: 0 0 80px oklch(0.66 0.087 248 / 0.18);\n}\n\n/* ========== Subscribe ========== */\n.subscribe {\n  margin-top: 26px;\n  display: flex; align-items: center; gap: 10px;\n  padding: 6px 6px 6px 20px;\n  border-radius: 999px;\n  max-width: 560px;\n}\n.subscribe .sub-prefix {\n  font-family: var(--f-mono);\n  font-size: 13px; color: var(--acc);\n}\n.subscribe input {\n  flex: 1;\n  background: transparent;\n  border: 0; outline: 0;\n  color: var(--fg);\n  font-family: var(--f-sans); font-size: 14px;\n  padding: 12px 4px;\n}\n.subscribe input::placeholder { color: var(--fg-3); }\n.subscribe .sub-btn {\n  width: 40px; height: 40px; border-radius: 999px;\n  background: var(--acc); color: var(--bg-deep);\n  border: 0; cursor: pointer;\n  display: grid; place-items: center;\n  transition: transform .2s ease, box-shadow .2s ease;\n}\n.subscribe .sub-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px -10px var(--acc-glow); }\n.subscribe .sub-btn svg { width: 16px; height: 16px; }\n\n/* ========== Featured live visual ========== */\n.featured-section { padding: 60px 0 120px; }\n.featured-card {\n  border-radius: 32px;\n  overflow: hidden;\n  position: relative;\n  aspect-ratio: 16 / 9;\n  max-width: 1320px;\n  margin: 0 auto;\n}\n.featured-card.glass-2 { border-radius: 32px; }\n.featured-vid {\n  position: absolute; inset: 0;\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 50%, oklch(0.2 0.04 145), oklch(0.08 0.012 145) 70%);\n  overflow: hidden;\n}\n.fv-grid {\n  position: absolute; inset: 0;\n  background-image:\n    linear-gradient(to right, oklch(1 0 0 / 0.05) 1px, transparent 1px),\n    linear-gradient(to bottom, oklch(1 0 0 / 0.05) 1px, transparent 1px);\n  background-size: 56px 56px;\n  mask-image: radial-gradient(ellipse 90% 70% at 50% 50%, black 30%, transparent 90%);\n  -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 50%, black 30%, transparent 90%);\n  animation: fvDrift 20s linear infinite;\n}\n@keyframes ointer-events: none;\n}\n\n.featured-overlay {\n  position: absolute; left: 0; right: 0; bottom: 0;\n  padding: 32px clamp(20px, 3vw, 40px);\n  display: flex; align-items: end; justify-content: space-between; gap: 32px;\n  z-index: 4;\n}\n.featured-card-inner {\n  max-width: 460px;\n  padding: 26px;\n  border-radius: 20px;\n}\n.featured-card-inner .eyebrow { margin-bottom: 12px; }\n.featured-card-inner p {\n  font-size: 14.5px; line-height: 1.55; color: var(--fg);\n}\n.featured-cta { background: oklch(1 0 0 / 0.04); }\n\n@media (max-width: 820px) {\n  .featured-card { aspect-ratio: 4/5; }\n  .featured-overlay { flex-direction: column; align-items: stretch; gap: 18px; }\n  .featured-card-inner { max-width: none; }\n}\n\n.hero-row {\n  display: grid;\n  grid-template-columns: 1.05fr 0.95fr;\n  gap: 60px;\n  align-items: start;\n  margin-top: 48px;\n}\n.hero-left {\n  display: flex; flex-direction: column;\n  align-self: stretch;\n}\n.hero-left .kinetic-title { margin-bottom: 28px; }\n.hero-sub {\n  font-size: clamp(17px, 1.35vw, 21px);\n  line-height: 1.5;\n  color: var(--fg-2);\n  max-width: 560px;\n  margin-bottom: 36px;\n}\n.hero-sub strong { color: var(--fg); font-weight: 600; }\n.hero-left .cta-row { margin-top: 0; margin-bottom: 22px; }\n.hero-left .subscribe { margin-top: 0; }\n\n@media (max-width: 1080px) {\n  .hero-row { grid-template-columns: 1fr; gap: 36px; }\n  .hero-left .subscribe { max-width: none; }\n}\n\n/* ===== 3D Live Readout Card ===== */\n.readout-3d-wrap {\n  perspective: 1600px;\n  perspective-origin: 50% 40%;\n  /* Card uses steel-blue accent; LIVE pill / glow stays bright green */\n  --acc: oklch(0.66 0.087 248);\n  --acc-2: oklch(0.66 0.087 248);\n  --acc-dim: oklch(0.5 0.087 248);\n  --acc-glow: oklch(0.66 0.087 248 / 0.45);\n}\n.readout.readout-3d {\n  padding: 24px 26px 20px;\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n  position: relative;\n  overflow: hidden;\n  border-radius: 26px;\n  transform: rotateY(-7deg) rotateX(3deg);\n  transform-style: preserve-3d;\n  transition: transform .9s cubic-bezier(.2,.7,.2,1);\n  box-shadow:\n    inset 0 1px 1px oklch(1 0 0 / 0.10),\n    0 50px 90px -30px oklch(0 0 0 / 0.55),\n    0 0 0 1px oklch(0.72 0.255 142 / 0.06),\n    0 0 80px -20px oklch(0.72 0.255 142 / 0.25);\n}\n.readout.readout-3d::after {\n  content: \"\";\n  position: absolute; inset: 0;\n  background:\n    radial-gradient(ellipse 70% 50% at 100% 0%, oklch(0.72 0.255 142 / 0.20), transparent 60%),\n    radial-gradient(ellipse 60% 50% at 0% 100%, oklch(0.72 0.255 142 / 0.08), transparent 60%);\n  pointer-events: none; z-index: 1;\n}\n.readout.readout-3d > * { position: relative; z-index: 2; }\n.readout-3d-wrap:hover .readout.readout-3d {\n  transform: rotateY(-4deg) rotateX(2deg);\n}\n\n/* Subtle moving glow rim along the bottom edge */\n.readout.readout-3d::before {\n  /* ::before already used by .glass for inner border gradient — leave it alone */\n}\n\n/* Head */\n.rd-head {\n  display: flex; align-items: flex-start; justify-content: space-between;\n  gap: 16px;\n}\n.rd-live {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 12px 6px 10px;\n  border-radius: 999px;\n  /* Glassmorphism backdrop with green text + outline — matches .hero-live-pill */\n  background: oklch(0.72 0.255 142 / 0.08);\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n  --acc: var(--state);\n  --acc-glow: var(--state-glow);\n  box-shadow:\n    inset 0 0 0 1px var(--acc),\n    inset 0 1px 0 oklch(1 0 0 / 0.12),\n    0 6px 18px -8px var(--acc-glow);\n  font-family: var(--f-mono);\n  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--acc);\n  font-weight: 700;\n}\n.rd-live .live-dot { width: 7px; height: 7px; }\n\n/* Clock viz orbit / face */\n.rd-clockviz {\n  width: 100px; height: 100px;\n  position: relative;\n  flex-shrink: 0;\n  transform: translateZ(40px);\n}\n.rd-clockviz-orbit {\n  position: absolute; inset: 0;\n  border: 1px solid oklch(0.72 0.255 142 / 0.25);\n  border-radius: 999px;\n}\n.rd-clockviz-orbit.a {\n  inset: -8px;\n  border-color: oklch(0.72 0.255 142 / 0.35);\n  animation: rdOrbitSpin 18s linear infinite;\n}\n.rd-clockviz-orbit.a::before {\n  content: \"\"; position: absolute; top: -3px; left: 50%;\n  width: 6px; height: 6px; border-radius: 999px;\n  background: var(--acc);\n  box-shadow: 0 0 12px var(--acc-glow);\n  transform: translateX(-50%);\n}\n.rd-clockviz-orbit.b {\n  transform: rotateZ(60deg);\n  border-style: dashed;\n  border-color: oklch(0.72 0.255 142 / 0.20);\n  animation: rdOrbitSpin 30s linear infinite reverse;\n}\n.rd-clockviz-orbit.c {\n  inset: 8px;\n  border-color: oklch(0.72 0.255 142 / 0.15);\n  animation: rdOrbitSpin 26s linear infinite;\n}\n@keyframes rdOrbitSpin {\n  to { transform: rotateZ(360deg); }\n}\n.rd-clockviz-face {\n  position: absolute; inset: 18px;\n  border-radius: 999px;\n  background:\n    radial-gradient(circle at 30% 30%, oklch(0.3 0.08 142 / 0.7), oklch(0.12 0.012 150 / 0.85));\n  box-shadow:\n    inset 0 0 0 1px oklch(0.72 0.255 142 / 0.4),\n    inset 0 2px 8px oklch(0.72 0.255 142 / 0.2);\n}\n.rd-clockviz-tick {\n  position: absolute; inset: 0;\n  display: grid; place-items: start center;\n  transform: rotate(var(--a));\n}\n.rd-clockviz-tick::before {\n  content: \"\";\n  width: 1.5px; height: 4px;\n  background: oklch(0.72 0.255 142 / 0.5);\n  margin-top: 3px;\n}\n.rd-clockviz-hand {\n  position: absolute;\n  left: 50%; top: 50%;\n  background: var(--acc);\n  border-radius: 2px;\n  transform-origin: 50% 100%;\n  box-shadow: 0 0 6px var(--acc-glow);\n}\n.rd-clockviz-hand.h { width: 1.5px; height: 18px; margin-left: -0.75px; margin-top: -18px; }\n.rd-clockviz-hand.m { width: 1.5px; height: 24px; margin-left: -0.75px; margin-top: -24px; opacity: 0.85; }\n.rd-clockviz-hand.s { width: 1px;   height: 26px; margin-left: -0.5px;  margin-top: -26px; opacity: 0.6; background: oklch(0.97 0.005 145); }\n.rd-clockviz-pin {\n  position: absolute; left: 50%; top: 50%;\n  width: 4px; height: 4px; border-radius: 999px;\n  background: var(--acc);\n  transform: translate(-50%, -50%);\n  box-shadow: 0 0 8px var(--acc-glow);\n}\n\n/* Time block */\n.rd-time-block {\n  display: flex; flex-direction: column; gap: 8px;\n  transform: translateZ(30px);\n}\n.rd-time-label {\n  font-family: var(--f-mono);\n  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--fg-3);\n}\n.rd-time {\n  font-family: var(--f-mono);\n  font-size: clamp(38px, 4vw, 56px);\n  line-height: 1;\n  letter-spacing: -0.025em;\n  color: var(--fg);\n  font-weight: 500;\n  font-variant-numeric: tabular-nums;\n  display: inline-flex; align-items: baseline;\n}\n.rd-time .sep {\n  display: inline-block;\n  color: var(--fg-3);\n  animation: rdSepBlink 1s steps(2) infinite;\n  margin: 0 0.04em;\n}\n@keyframes rdSepBlink { 50% { opacity: 0.3; } }\n.rd-time .ms {\n  font-size: 0.42em;\n  color: var(--fg-3);\n  letter-spacing: -0.02em;\n  margin-left: 0.18em;\n  font-variant-numeric: tabular-nums;\n}\n.rd-time-meta {\n  display: flex; align-items: center; gap: 10px;\n  font-family: var(--f-mono);\n  font-size: 11px; letter-spacing: 0.06em;\n  color: var(--fg-3);\n  white-space: nowrap;\n}\n.rd-time-meta #rd-date { white-space: nowrap; }\n.rd-time-meta .dot { color: var(--fg-4); }\n.rd-progress {\n  flex: 1;\n  height: 2px;\n  border-radius: 999px;\n  background: oklch(1 0 0 / 0.06);\n  overflow: hidden;\n  margin-left: 8px;\n}\n#rd-progress-bar {\n  display: block; height: 100%; width: 0%;\n  background: linear-gradient(to right, transparent, var(--acc));\n  box-shadow: 0 0 12px var(--acc-glow);\n}\n\n/* Stats grid */\n.rd-stats {\n  display: grid; grid-template-columns: 1.1fr 1.1fr 0.85fr; gap: 10px;\n  transform: translateZ(20px);\n}\n.rd-stat {\n  padding: 12px 14px;\n  border-radius: 12px;\n  background: oklch(1 0 0 / 0.025);\n  box-shadow: inset 0 0 0 1px oklch(1 0 0 / 0.06);\n}\n.rd-stat-lab      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== Marquee ===== -->\n    <div class=\"marquee\" aria-hidden=\"true\">\n      <div class=\"marquee-track\">\n        <span class=\"marquee-item\">TIMESTAMP <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">VERIFY <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">LOG <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">SCHEDULE <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">SYNCHRONIZE <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">EXECUTE <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">TIMESTAMP <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">VERIFY <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">LOG <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">SCHEDULE <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">SYNCHRONIZE <span class=\"dot\"><\u002Fspan><\u002Fspan>\n        <span class=\"marquee-item\">EXECUTE <span class=\"dot\"><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== Issue + What is Clockchain ===== -->\n    <section class=\"section issues-section\" data-screen-label=\"02 Issues\">\n      <div class=\"issues-video-wrap\" aria-hidden=\"true\">\n        <video class=\"issues-video\" id=\"issues-video\" muted=\"\" autoplay=\"\" playsinline=\"\" loop=\"\" preload=\"auto\" data-hls=\"https://stream.mux.com/Kec29dVyJgiPdtWaQtPuEiiGHkJIYQAVUJcNiIHUYeo.m3u8\"><\u002Fvideo>\n        <div class=\"issues-video-tint\"><\u002Fdiv>\n        <div class=\"issues-video-grid\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"shell\">\n        <div class=\"section-head reveal\">\n          <h2>Issues Around <em>Timekeeping<\u002Fem> and <em>Timestamps<\u002Fem>.<\u002Fh2>\n          <p class=\"lede\">\n            Existing time synchronization protocols like NTP, TAI, UTC, GPS, and timestamp protocols such as\n            ISO 8601 and RFC 3339, despite their widespread use, are susceptible to manipulation and\n            inaccuracies due to their reliance on centralized sources, the inability to verify the data and\n            a lack of a unified global standard. This discrepancy poses significant risks in sectors where\n            precise timekeeping and time-stamping is essential.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"issue-wrap issue-wrap-tri\">\n          <article class=\"issue-card feature glass-2 reveal\" data-step=\"1\">\n            <div class=\"num\"><span class=\"num-dot\"><\u002Fspan>01 · What is Clockchain?<\u002Fdiv>\n            <h3>A new type of blockchain clock.<\u002Fh3>\n            <p>\n              A new type of blockchain clock, setting a new standard of global timekeeping and timestamping.\n              A verifiable and immutable version of time, Clockchain serves critical sectors like finance,\n              supply chain, and autonomous systems.\n            <\u002Fp>\n            <p>\n              With its decentralized structure and token economy the Clockchain network is a democratic\n              solution for the digital age, defining the future of time.\n            <\u002Fp>\n          <\u002Farticle>\n\n          <article class=\"issue-card glass reveal\" data-step=\"2\" style=\"--d: 120ms\">\n            <div class=\"num\"><span class=\"num-dot\"><\u002Fspan>02 · Vision<\u002Fdiv>\n            <h3>A foundational pillar of Web3 infrastructure.<\u002Fh3>\n            <p>\n              Our vision is to secure and revolutionize the integrity of time-related data through\n              blockchain technology, becoming a foundational pillar of Web3 infrastructure. We aim to\n              enable autonomous systems to operate with enhanced accountability, transparency, and trust.\n            <\u002Fp>\n          <\u002Farticle>\n\n          <article class=\"issue-card glass reveal\" data-step=\"3\" style=\"--d: 240ms\">\n            <div class=\"num\"><span class=\"num-dot\"><\u002Fspan>03 · Mission<\u002Fdiv>\n            <h3>A new global standard for time.<\u002Fh3>\n            <p>\n              The Clockchain is a time focused blockchain network. Its mission is to create a new global\n              standard for accuracy and security in timekeeping and timestamping, and integrating these\n              innovations into forthcoming Web 3.0 applications.\n            <\u002Fp>\n          <\u002Farticle>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== Solution ===== -->\n    <section class=\"section\" id=\"solution\" data-screen-label=\"03 Solution\">\n      <div class=\"shell\">\n        <div class=\"section-head reveal\">\n          <h2>The <em>solution<\u002Fem>.<\u002Fh2>\n          <p class=\"lede\">\n            Three primitives, working together. A decentralized physical network of certified time sources,\n            aggregated by AI, validated on-chain through Proof-of-Time consensus.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"solution-grid\">\n          <article class=\"sol-card glass reveal\" data-tilt=\"\">\n            <div class=\"big-num\">01<\u002Fdiv>\n            <h4>Decentralized timestamping via DePIN.<\u002Fh4>\n            <p>\n              A physical infrastructure network of global certification authorities — Safran atomic clocks,\n              NICT, GPS, atomic time sources — manages timestamping across regions for accuracy that no single\n              authority can tamper with.\n            <\u002Fp>\n            <div class=\"tag\">DePIN · Distributed sources<\u002Fdiv>\n          <\u002Farticle>\n\n          <article class=\"sol-card glass reveal\" data-tilt=\"\" style=\"--d: 100ms\">\n            <div class=\"big-num\">02<\u002Fdiv>\n            <h4>AI + blockchain integration.<\u002Fh4>\n            <p>\n              AI models reconcile time data across heterogeneous sources, weighting and ranking inputs in real\n              time, then propagating the validated state to nodes worldwide for instant consensus.\n            <\u002Fp>\n            <div class=\"tag\">Adaptive consensus · Sub-second<\u002Fdiv>\n          <\u002Farticle>\n\n          <article class=\"sol-card glass reveal\" data-tilt=\"\" style=\"--d: 200ms\">\n            <div class=\"big-num\">03<\u002Fdiv>\n            <h4>Proof-of-Time consensus.<\u002Fh4>\n            <p>\n              A new consensus mechanism that aggregates time data from all global sources and validates it\n              on-chain — ensuring accuracy and consistency across every block, every second.\n            <\u002Fp>\n            <div class=\"tag\">PoT · On-chain validation<\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== Services ===== -->\n    <section class=\"section\" id=\"services\" data-screen-label=\"04 Services\">\n      <div class=\"shell\">\n        <div class=\"section-head reveal\">\n          <h2>Three services. <em>One clock.<\u002Fem><\u002Fh2>\n          <p class=\"lede\">\n            A complete toolkit for any product that depends on the integrity of a moment — easy to integrate,\n            instantly verifiable, decentralized by default.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"services-list\">\n\n          <article class=\"service glass reveal\" data-swipe=\"left\">\n            <p class=\"q\">\"Have you ever needed an easy way to log your data on a blockchain — and authenticate it instantly from anywhere in the world?\"<\u002Fp>\n            <div class=\"body\">\n              <h4>Logging, Authentication &amp; Timestamps<\u002Fh4>\n              <p>\n                Timestamp and log data every second onto Clockchain in a simple, decentralized, cost-effective\n                way. Instantly authenticate from any device, anywhere — and never be fooled again.\n              <\u002Fp>\n            <\u002Fdiv>\n            <div class=\"glyph\">\n              <svg viewBox=\"0 0 200 200\" fill=\"none\" class=\"auth-illu\" aria-hidden=\"true\">\n                <defs>\n                  <linearGradient id=\"auth-beam\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                    <stop offset=\"0\" stop-color=\"var(--state)\" stop-opacity=\"0\"><\u002Fstop>\n                    <stop offset=\"0.55\" stop-color=\"var(--state)\" stop-opacity=\"0.55\"><\u002Fstop>\n                    <stop offset=\"1\" stop-color=\"var(--state)\" stop-opacity=\"0\"><\u002Fstop>\n                  <\u002FlinearGradient>\n                  <radialGradient id=\"auth-floor-glow\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                    <stop offset=\"0\" stop-color=\"var(--acc)\" stop-opacity=\"0.22\"><\u002Fstop>\n                    <stop offset=\"1\" stop-color=\"var(--acc)\" stop-opacity=\"0\"><\u002Fstop>\n                  <\u002FradialGradient>\n                <\u002Fdefs>\n\n                <!-- floor ambient glow -->\n                <ellipse cx=\"100\" cy=\"178\" rx=\"94\" ry=\"12\" fill=\"url(#auth-floor-glow)\"><\u002Fellipse>\n\n                <!-- floor traces (data flow — green = live state) -->\n                <path class=\"auth-trace t1\" d=\"M 48 144 V 170 H 100 V 164\" stroke=\"var(--state)\" stroke-width=\"1\" fill=\"none\" stroke-dasharray=\"3 4\"><\u002Fpath>\n                <path class=\"auth-trace t2\" d=\"M 162 140 V 170 H 100 V 164\" stroke=\"var(--state)\" stroke-width=\"1\" fill=\"none\" stroke-dasharray=\"3 4\"><\u002Fpath>\n\n                <!-- VAULT -->\n                <g class=\"auth-vault\" transform=\"translate(8 60)\">\n                  <rect width=\"80\" height=\"82\" rx=\"6\" stroke=\"var(--acc)\" stroke-width=\"1.5\" fill=\"oklch(0.66 0.087 248 / 0.05)\"><\u002Frect>\n                  <rect x
